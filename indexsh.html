<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shampoo+sérume</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="shampoo-contianer">
        <div class="container">
            <div class="title">
                <h2>shampoo+sérume</h2>
            </div>
            <div class="all-box">
              
                <div class="box">
                    <input type="checkbox"  id="b1">
                    <label for="b1">
                        <h2>01</h2>
                        <h3>champoo bar</h3>
                    </label>
                    <div class="content">
                        <p>1000 da</p>
                        <p>100g</p>
                    </div>

                </div>
                <div class="box">
                    <input type="checkbox"  id="b2">
                    <label for="b2">
                        <h2>02</h2>
                        <h3>sérume</h3>
                    </label>
                    <div class="content">
                        <p>900 da</p>
                        <p>50ml</p>
                    </div>

                </div>
                <div class="box">
                    <input type="checkbox"  id="b3">
                    <label for="b3">
                        <h2>03</h2>
                        <h3>masque</h3>
                    </label>
                    <div class="content">
                        <p>1400 da</p>
                        <p>100g</p>
                    </div>

                </div>
            </div>
        </div>
    </section>
</body>

</html>
